<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theatro - Living Narrative Engine</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Base Styles -->
  <link rel="stylesheet" href="/src/styles/variables.css">
  <link rel="stylesheet" href="/src/styles/design-system.css">
  <link rel="stylesheet" href="/src/styles/app.css">
  <link rel="stylesheet" href="/src/styles/chat.css">
  <link rel="stylesheet" href="/src/styles/modal.css">
  
  <style>
    /* Loading Screen */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    
    .loading-logo {
      font-family: 'Cinzel', serif;
      font-size: 48px;
      font-weight: 500;
      color: #ff9f43;
      letter-spacing: 0.1em;
      animation: logo-glow 2s ease-in-out infinite;
    }
    
    @keyframes logo-glow {
      0%, 100% { text-shadow: 0 0 20px rgba(255, 159, 67, 0.3); }
      50% { text-shadow: 0 0 40px rgba(255, 159, 67, 0.6); }
    }
    
    .loading-subtitle {
      margin-top: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }
    
    .loading-dots {
      display: flex;
      gap: 8px;
      margin-top: 24px;
    }
    
    .loading-dot {
      width: 8px;
      height: 8px;
      background: #ff9f43;
      border-radius: 50%;
      animation: dot-pulse 1.4s ease-in-out infinite;
    }
    
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes dot-pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-logo">Theatro</div>
    <div class="loading-subtitle">Living Narrative Engine</div>
    <div class="loading-dots">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
  </div>

  <!-- Main App Container -->
  <div id="app"></div>

  <!-- Scripts -->
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
