<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Theatro — A living narrative engine where AI characters with souls interact in evolving stories">
  <meta name="theme-color" content="#0a0a0f">
  <title>Theatro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* CSS Reset & Base */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Theatro Color Palette - Cinematic Theater */
      --bg-darkest: #050508;
      --bg-dark: #0a0a0f;
      --bg-primary: #12121a;
      --bg-secondary: #1a1a24;
      --bg-tertiary: #252532;
      --bg-elevated: #2d2d3d;
      
      /* Stage Lighting Accents */
      --accent-amber: #f59e0b;
      --accent-amber-glow: rgba(245, 158, 11, 0.3);
      --accent-purple: #8b5cf6;
      --accent-purple-glow: rgba(139, 92, 246, 0.3);
      --accent-rose: #f43f5e;
      --accent-cyan: #06b6d4;
      --accent-emerald: #10b981;
      
      /* Text Colors */
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-tertiary: #71717a;
      --text-muted: #52525b;
      
      /* Gradients */
      --gradient-stage: linear-gradient(135deg, var(--bg-darkest) 0%, var(--bg-primary) 50%, var(--bg-secondary) 100%);
      --gradient-spotlight: radial-gradient(ellipse at top, rgba(245, 158, 11, 0.15) 0%, transparent 50%);
      --gradient-curtain: linear-gradient(180deg, rgba(139, 92, 246, 0.1) 0%, transparent 100%);
      
      /* Typography */
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      
      /* Spacing */
      --space-xs: 0.25rem;
      --space-sm: 0.5rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --space-2xl: 3rem;
      
      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
      --shadow-glow-amber: 0 0 20px var(--accent-amber-glow);
      --shadow-glow-purple: 0 0 20px var(--accent-purple-glow);
      
      /* Transitions */
      --transition-fast: 150ms ease;
      --transition-base: 250ms ease;
      --transition-slow: 350ms ease;
      
      /* Layout */
      --sidebar-width: 280px;
      --drawer-width: 380px;
      --header-height: 64px;
      --input-height: 80px;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-darkest);
      color: var(--text-primary);
      min-height: 100vh;
      overflow: hidden;
    }

    /* Loading Screen */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--gradient-stage);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      transition: opacity 0.3s ease;
    }

    .loading-logo {
      font-family: var(--font-display);
      font-size: 3rem;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent-amber) 0%, var(--accent-purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: logoPulse 2s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { opacity: 0.8; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.02); }
    }

    .loading-tagline {
      margin-top: var(--space-md);
      color: var(--text-secondary);
      font-size: 0.875rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .loading-spinner {
      margin-top: var(--space-xl);
      width: 40px;
      height: 40px;
      border: 2px solid var(--bg-tertiary);
      border-top-color: var(--accent-amber);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Main App Container */
    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Utility Classes */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-dark);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg-tertiary);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* Animation Classes */
    .animate-spin {
      animation: spin 1s linear infinite;
    }

    .streaming-dots circle {
      animation: streamingDot 1.4s ease-in-out infinite;
    }

    .streaming-dots circle:nth-child(2) {
      animation-delay: 0.2s;
    }

    .streaming-dots circle:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes streamingDot {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Reduced Motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loading-logo">Theatro</div>
    <div class="loading-tagline">Where Characters Come Alive</div>
    <div class="loading-spinner"></div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
